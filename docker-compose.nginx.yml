# Production stack for VPS with host nginx (no Caddy — avoids port 80/443 conflicts).
name: sales-health-check

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sales_health_check}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-sales_health_check}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    image: ${APP_IMAGE:-ghcr.io/javid1371/sales-health-check:latest}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "127.0.0.1:${APP_PORT:-3105}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sales_health_check}
      NODE_ENV: production
      PORT: 3000
      EXPERT_VIEW_TOKEN: ${EXPERT_VIEW_TOKEN:-}
      CAPACITY_MODE: ${CAPACITY_MODE:-free}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-${SENTRY_DSN:-}}
      PDF_GENERATION_ENABLED: ${PDF_GENERATION_ENABLED:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:?Set AUTH_SESSION_SECRET in .env}
      KAVENEGAR_API_KEY: ${KAVENEGAR_API_KEY:-}
      KAVENEGAR_OTP_TEMPLATE: ${KAVENEGAR_OTP_TEMPLATE:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      SALES_EXPERT_PASSWORD: ${SALES_EXPERT_PASSWORD:-}
      SALES_EXPERT_PASSWORD_HASH: ${SALES_EXPERT_PASSWORD_HASH:-}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-300}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      BALE_BOT_TOKEN: ${BALE_BOT_TOKEN:-}
      BALE_WEBHOOK_SECRET: ${BALE_WEBHOOK_SECRET:-}
      REDIS_URL: redis://redis:6379
      SMS_FUNNEL_ENABLED: ${SMS_FUNNEL_ENABLED:-false}
      KAVENEGAR_SENDER_LINE: ${KAVENEGAR_SENDER_LINE:-}
      SMS_QUIET_HOURS_START: ${SMS_QUIET_HOURS_START:-9}
      SMS_QUIET_HOURS_END: ${SMS_QUIET_HOURS_END:-21}
      SMS_FUNNEL_MAX_UNANSWERED: ${SMS_FUNNEL_MAX_UNANSWERED:-4}
      SMS_FUNNEL_CRON_SECRET: ${SMS_FUNNEL_CRON_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  sms-funnel-worker:
    image: ${APP_IMAGE:-ghcr.io/javid1371/sales-health-check:latest}
    pull_policy: always
    restart: unless-stopped
    command: ["/prisma-tools/node_modules/.bin/tsx", "scripts/sms-funnel-worker.ts"]
    environment:
      HOME: /app
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sales_health_check}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      SMS_FUNNEL_ENABLED: ${SMS_FUNNEL_ENABLED:-false}
      KAVENEGAR_API_KEY: ${KAVENEGAR_API_KEY:-}
      KAVENEGAR_OTP_TEMPLATE: ${KAVENEGAR_OTP_TEMPLATE:-}
      KAVENEGAR_SENDER_LINE: ${KAVENEGAR_SENDER_LINE:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      SMS_QUIET_HOURS_START: ${SMS_QUIET_HOURS_START:-9}
      SMS_QUIET_HOURS_END: ${SMS_QUIET_HOURS_END:-21}
      SMS_FUNNEL_MAX_UNANSWERED: ${SMS_FUNNEL_MAX_UNANSWERED:-4}
      SMS_FUNNEL_WORKER_CONCURRENCY: ${SMS_FUNNEL_WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
